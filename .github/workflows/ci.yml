name: Проверка проекта

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-windows:
    name: Windows, Python 3.12
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Получить исходный код
        uses: actions/checkout@v7

      - name: Установить Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Установить Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Установить зависимости Python
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -c constraints.txt

      - name: Проверить импорты и синтаксис Python
        run: python -m compileall -q app tests

      - name: Запустить тесты
        run: python -m pytest

      - name: Проверить JavaScript
        shell: pwsh
        run: |
          $files = Get-ChildItem app/static, browser-extension, tests -Filter *.js -Recurse -File
          foreach ($file in $files) {
            node --check $file.FullName
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
